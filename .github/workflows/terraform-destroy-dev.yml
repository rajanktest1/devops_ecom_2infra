name: Terraform Destroy — dev

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy-dev" to confirm destruction of the dev environment'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy-dev:
    name: Destroy — dev
    runs-on: ubuntu-latest
    environment: dev   # uses the same GitHub Environment (and any required reviewers you've configured)

    steps:
      - name: Validate confirmation input
        if: ${{ github.event.inputs.confirm != 'destroy-dev' }}
        run: |
          echo "Confirmation input was '${{ github.event.inputs.confirm }}', expected 'destroy-dev'."
          exit 1

      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init (dev)
        working-directory: environments/dev
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Destroy (dev)
        working-directory: environments/dev
        run: |
          terraform destroy -auto-approve \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="deployer_object_id=${{ secrets.AZURE_CLIENT_OBJECT_ID }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}" \
            -var="artifact_storage_account=${{ vars.ARTIFACT_STORAGE_ACCOUNT }}"
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
