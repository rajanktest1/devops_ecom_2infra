name: Terraform Apply

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Deploy shared artifacts storage first (only if changed)
  # ------------------------------------------------------------------
  shared:
    name: Apply — shared
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init + Apply (shared/artifacts-storage)
        working-directory: shared/artifacts-storage
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          terraform apply -auto-approve
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ------------------------------------------------------------------
  # dev — auto-apply, no approval gate
  # ------------------------------------------------------------------
  dev:
    name: Apply — dev
    runs-on: ubuntu-latest
    needs: shared
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init + Apply (dev)
        working-directory: environments/dev
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          terraform apply -auto-approve \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="deployer_object_id=${{ secrets.AZURE_CLIENT_OBJECT_ID }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}" \
            -var="artifact_storage_account=${{ vars.ARTIFACT_STORAGE_ACCOUNT }}"
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ------------------------------------------------------------------
  # staging — auto-apply after dev succeeds
  # ------------------------------------------------------------------
  staging:
    name: Apply — staging
    runs-on: ubuntu-latest
    needs: dev
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init + Apply (staging)
        working-directory: environments/staging
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          terraform apply -auto-approve \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="deployer_object_id=${{ secrets.AZURE_CLIENT_OBJECT_ID }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}" \
            -var="artifact_storage_account=${{ vars.ARTIFACT_STORAGE_ACCOUNT }}"
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ------------------------------------------------------------------
  # prod — requires manual approval (GitHub Environment gate)
  # ------------------------------------------------------------------
  prod:
    name: Apply — prod
    runs-on: ubuntu-latest
    needs: staging
    environment: prod   # ← configure required reviewers in GitHub Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.8"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init + Apply (prod)
        working-directory: environments/prod
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ vars.TFSTATE_STORAGE_ACCOUNT }}"
          terraform apply -auto-approve \
            -var="tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="deployer_object_id=${{ secrets.AZURE_CLIENT_OBJECT_ID }}" \
            -var="db_admin_password=${{ secrets.DB_ADMIN_PASSWORD }}" \
            -var="vm_admin_password=${{ secrets.VM_ADMIN_PASSWORD }}" \
            -var="artifact_storage_account=${{ vars.ARTIFACT_STORAGE_ACCOUNT }}"
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
